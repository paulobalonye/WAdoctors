<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - WAdoctors</title>
    <link rel="stylesheet" href="/portal/styles.css" />
  </head>
  <body
    class="auth-page"
    style="background-image: url('/portal/assets/admin-login-bg.jpg')"
  >
    <div class="auth-overlay"></div>
    <div class="auth-card">
      <h1>Admin Login</h1>
      <div class="muted" style="margin-bottom: 12px">Operations and platform management workspace.</div>

      <div class="field">
        <label for="adminEmailInput">Admin Email</label>
        <input id="adminEmailInput" placeholder="admin@wadoctors.local" />
      </div>
      <div class="field">
        <label for="adminPasswordInput">Password</label>
        <input id="adminPasswordInput" type="password" placeholder="Password" />
      </div>
      <div class="auth-actions" style="margin-bottom: 10px">
        <button id="adminLoginBtn">Login</button>
      </div>

      <div id="adminStatusBar" class="statusbar" style="margin-top: 12px">Sign in to continue.</div>
    </div>

    <script type="module" src="/portal/js/admin-login.js"></script>
  </body>
</html>
